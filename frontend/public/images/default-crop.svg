<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad1)"/>

  <!-- Leaf Icon -->
  <g transform="translate(200,200)">
    <!-- Main leaf -->
    <ellipse cx="0" cy="0" rx="80" ry="120" fill="#ffffff" opacity="0.9" transform="rotate(-20)"/>

    <!-- Leaf vein -->
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#10b981" stroke-width="4" opacity="0.5"/>

    <!-- Side veins -->
    <line x1="0" y1="-60" x2="-40" y2="-30" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-60" x2="40" y2="-30" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="20" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="50" y2="20" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="60" x2="-40" y2="75" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="60" x2="40" y2="75" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Text -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">
    Fresh Crop
  </text>
</svg>
