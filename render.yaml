services:
  # Backend Service
  - type: web
    name: achhadam-backend
    env: node
    plan: free
    buildCommand: cd backend && rm -rf node_modules && npm install --legacy-peer-deps
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromDatabase:
          name: achhadam-mongodb
          property: connectionString
      - key: POSTGRES_URL
        fromDatabase:
          name: achhadam-postgres
          property: connectionString
      - key: JWT_SECRET
        value: achhadam_jwt_secret_key_2025_production_do_not_share
      - key: FIREBASE_PROJECT_ID
        value: your-firebase-project-id
      - key: FIREBASE_PRIVATE_KEY
        value: your-firebase-private-key
      - key: FIREBASE_CLIENT_EMAIL
        value: your-firebase-client-email

  # Frontend Service
  - type: web
    name: achhadam-frontend
    env: static
    plan: free
    buildCommand: cd frontend && rm -rf node_modules/.vite && rm -rf node_modules/.cache && rm -rf dist && npm cache clean --force && npm install --no-cache && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      # HTML - NEVER CACHE
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0, s-maxage=0
      - path: /
        name: Pragma
        value: no-cache
      - path: /
        name: Expires
        value: "0"

      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0, s-maxage=0
      - path: /index.html
        name: Pragma
        value: no-cache
      - path: /index.html
        name: Expires
        value: "0"
      - path: /index.html
        name: X-Content-Type-Options
        value: nosniff

      # Service Worker - NEVER CACHE
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0, s-maxage=0
      - path: /sw.js
        name: Pragma
        value: no-cache

      # Assets with hash - Cache forever (immutable with hash)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # Other HTML files - Cache for 1 hour
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate, max-age=0

      # Images - Cache for 1 day only (reduced from 1 week)
      - path: /*.jpg
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.png
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.webp
        name: Cache-Control
        value: public, max-age=86400

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://acchadam1-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: CACHE_BUST
        value: v2.0.0-cache-fix-20251203
      - key: PRERENDER_TOKEN
        value: enable-seo-crawling
      - key: FORCE_REBUILD
        value: "true"

databases:
  # MongoDB Database
  - name: achhadam-mongodb
    databaseName: achhadam
    user: achhadam_user
    plan: free

  # PostgreSQL Database
  - name: achhadam-postgres
    databaseName: achhadam_db
    user: achhadam_user
    plan: free









