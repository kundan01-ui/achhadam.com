services:
  - type: web
    name: achhadam-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: mongodb+srv://username:password@cluster.mongodb.net/achhadam
      - key: JWT_SECRET
        value: your-jwt-secret-key
      - key: CORS_ORIGIN
        value: https://www.achhadam.com,https://achhadam.com

